<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weeknight Cookbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Kitchen Notes</p>
        <h1>Cookbook</h1>
        <p class="hero-copy">
          A compact collection of reliable dinners, one-pan meals, and quick
          desserts for the middle of the week.
        </p>
      </section>

      <section class="controls" aria-label="Recipe filters">
        <div class="filter-group">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="dinner">Dinner</button>
          <button class="filter-chip" data-filter="lunch">Lunch</button>
          <button class="filter-chip" data-filter="dessert">Dessert</button>
        </div>
        <label class="search">
          <span class="sr-only">Search recipes</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Search recipes"
          />
        </label>
      </section>

      <section class="layout">
        <div id="bookReader" class="book-reader">
          <button
            id="expandBook"
            class="expand-button"
            type="button"
            aria-label="Expand book view"
          >
            ⤢
          </button>
          <button
            id="prevPage"
            class="page-button page-button--side"
            type="button"
            aria-label="Go backward"
          >
            &#8249;
          </button>
          <div id="recipeBook" class="recipe-book" aria-live="polite"></div>
          <button
            id="nextPage"
            class="page-button page-button--side"
            type="button"
            aria-label="Go forward"
          >
            &#8250;
          </button>
          <div class="book-nav">
            <p id="pageIndicator" class="page-indicator"></p>
          </div>
        </div>
      </section>
    </main>

    <div id="pageOverlay" class="page-overlay" hidden>
      <div class="page-overlay__glass">
        <button
          id="closeOverlay"
          class="expand-button expand-button--overlay"
          type="button"
          aria-label="Close expanded recipe"
        >
          ×
        </button>
        <div id="overlayPage" class="overlay-page"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
