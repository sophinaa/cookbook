<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookbook</title>
    <link rel="icon" href="favicon.ico?v=3" sizes="any" />
    <link rel="shortcut icon" href="favicon.ico?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=3" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Mascarpones Kitchen</p>
        <h1>Cookbook</h1>
      </section>

      <section class="controls" aria-label="Recipe filters">
        <div class="filter-group">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="dinner">Dinner</button>
          <button class="filter-chip" data-filter="lunch">Lunch</button>
          <button class="filter-chip" data-filter="dessert">Dessert</button>
        </div>
        <div class="controls-actions">
          <label class="search">
            <span class="sr-only">Search recipes</span>
            <input
              id="searchInput"
              type="search"
              placeholder="Search recipes"
            />
          </label>
          <button id="addRecipeButton" class="add-recipe-button" type="button">
            Add Recipe
          </button>
        </div>
      </section>

      <section class="layout">
        <div id="bookReader" class="book-reader">
          <button
            id="prevPage"
            class="page-button page-button--side"
            type="button"
            aria-label="Go backward"
          >
            &#8249;
          </button>
          <div id="recipeBook" class="recipe-book" aria-live="polite"></div>
          <button
            id="nextPage"
            class="page-button page-button--side"
            type="button"
            aria-label="Go forward"
          >
            &#8250;
          </button>
          <div class="book-nav">
            <p id="pageIndicator" class="page-indicator"></p>
          </div>
        </div>
      </section>
    </main>

    <div id="pageOverlay" class="page-overlay" hidden>
      <div class="page-overlay__glass">
        <button
          id="closeOverlay"
          class="expand-button expand-button--overlay"
          type="button"
          aria-label="Close expanded recipe"
        >
          ×
        </button>
        <div id="overlayPage" class="overlay-page"></div>
      </div>
    </div>

    <div id="formOverlay" class="page-overlay" hidden>
      <div class="page-overlay__glass page-overlay__glass--form">
        <button
          id="closeFormOverlay"
          class="expand-button expand-button--overlay"
          type="button"
          aria-label="Close add recipe form"
        >
          ×
        </button>
        <form id="addRecipeForm" class="recipe-form">
          <h2 id="recipeFormTitle">Add Recipe</h2>
          <label>
            <span>Title</span>
            <input id="recipeTitle" name="title" type="text" required />
          </label>
          <label>
            <span>Category</span>
            <select id="recipeCategory" name="category" required>
              <option value="dinner">Dinner</option>
              <option value="lunch">Lunch</option>
              <option value="dessert">Dessert</option>
            </select>
          </label>
          <label>
            <span>Time</span>
            <input id="recipeTime" name="time" type="text" placeholder="25 min" required />
          </label>
          <label>
            <span>Description</span>
            <textarea id="recipeDescription" name="description" rows="3" required></textarea>
          </label>
          <label>
            <span>Ingredients</span>
            <textarea
              id="recipeIngredients"
              name="ingredients"
              rows="4"
              placeholder="One per line"
              required
            ></textarea>
          </label>
          <label>
            <span>Steps</span>
            <textarea
              id="recipeSteps"
              name="steps"
              rows="5"
              placeholder="One per line"
              required
            ></textarea>
          </label>
          <button id="recipeFormSubmit" class="add-recipe-button" type="submit">
            Save Recipe
          </button>
        </form>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
